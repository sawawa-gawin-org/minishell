name: run Doxygen and deploy Firebase Hosting

on:
  push:
    branches: [ "main" ]

jobs:
  run_doxygen:
    runs-on: ubuntu-latest
    container:
      image: hrektts/doxygen:latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: Run Doxygen from Doxyfile
        run: |
          cd build
          doxygen Doxyfile
      - uses: FirebaseExtended/action-hosting-deploy@v0.6-alpha
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          projectId: minishell-site
          channelId: live
